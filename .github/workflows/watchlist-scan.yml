name: Watchlist Scan

on:
  schedule:
    # GitHub schedules are UTC
    - cron: "45 15 * * 1-5"   # 9:45am Central
    - cron: "30 18 * * 1-5"   # 12:30pm Central
    - cron: "30 21 * * 1-5"   # 3:30pm Central
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger bot scan
        env:
          BOT_URL: ${{ secrets.BOT_URL }}
          SCAN_SECRET: ${{ secrets.SCAN_SECRET }}
        run: |
          curl -X POST "$BOT_URL/scan" \
          -H "Content-Type: application/json" \
          -d "{\"secret\":\"$SCAN_SECRET\"}"
