name: Watchlist Scan
on:
  schedule:
    # GitHub schedules are UTC
    - cron: "45 13 * * 1-5"   # 8:45am Central
    - cron: "30 16 * * 1-5"   # 11:30am Central
    - cron: "00 18 * * 1-5"   # 2:30pm Central
  workflow_dispatch:
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger bot scan
        env:
          BOT_URL: ${{ secrets.BOT_URL }}
          SCAN_SECRET: ${{ secrets.SCAN_SECRET }}
        run: |
          curl -X POST "$BOT_URL/scan" \
          -H "Content-Type: application/json" \
          -d "{\"secret\":\"$SCAN_SECRET\"}"

  holdings-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger holdings sentiment scan
        env:
          BOT_URL: ${{ secrets.BOT_URL }}
          SCAN_SECRET: ${{ secrets.SCAN_SECRET }}
        run: |
          curl -X POST "$BOT_URL/holdings_scan" \
          -H "Content-Type: application/json" \
          -d "{\"secret\":\"$SCAN_SECRET\"}"
