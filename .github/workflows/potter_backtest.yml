name: Potter Box Backtest

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: 'Ticker to backtest (e.g. AAPL)'
        required: true
        default: 'AAPL'
      download_from:
        description: 'Data download start YYYY-MM-DD (18+ months recommended)'
        required: false
        default: '2024-01-01'
      to_date:
        description: 'End date YYYY-MM-DD (leave blank = today)'
        required: false
        default: ''

jobs:
  potter_backtest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests pandas pytz
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Download daily bars
        env:
          MARKETDATA_TOKEN: ${{ secrets.MARKETDATA_TOKEN }}
        run: |
          TO_ARG=""
          if [ -n "${{ github.event.inputs.to_date }}" ]; then
            TO_ARG="--to ${{ github.event.inputs.to_date }}"
          fi
          python backtest/download_daily_bars.py \
            --ticker ${{ github.event.inputs.ticker }} \
            --from ${{ github.event.inputs.download_from }} \
            $TO_ARG

      - name: Run Potter Box backtest
        run: |
          TICKER_UPPER=$(echo "${{ github.event.inputs.ticker }}" | tr '[:lower:]' '[:upper:]')
          TICKER_FILE=$(ls backtest/data/${TICKER_UPPER}_daily_*.csv 2>/dev/null | head -1)
          if [ -z "$TICKER_FILE" ]; then
            echo "ERROR: No daily CSV found for ${TICKER_UPPER}"
            ls backtest/data/ || echo "(empty)"
            exit 1
          fi
          mkdir -p backtest/results
          echo "Ticker data: $TICKER_FILE"
          python backtest/potter_backtest.py \
            --ticker ${{ github.event.inputs.ticker }} \
            --data   "$TICKER_FILE" \
            --output backtest/results/potter_backtest_results.json

      - name: Print summary
        run: |
          echo ""
          echo "══════════════════════════════════════════════════"
          python -c "
          import json
          with open('backtest/results/potter_backtest_results.json') as f:
              r = json.load(f)
          s = r['stats']
          print(f'  POTTER BOX v2 — {r[\"ticker\"]}')
          print('='*50)
          print(f'  Strategy: Position in box -> breakout through void -> next box')
          print(f'  Trades: {s[\"total_trades\"]} ({s[\"winners\"]}W / {s[\"losers\"]}L)')
          print(f'  Win Rate: {s[\"win_rate\"]}%')
          print(f'  Avg Win: {s[\"avg_win_pct\"]}% ({s[\"avg_win_r\"]}R)')
          print(f'  Avg Loss: {s[\"avg_loss_pct\"]}% ({s[\"avg_loss_r\"]}R)')
          print(f'  Total Return: {s[\"total_return_pct\"]}%')
          print(f'  Max Drawdown: {s[\"max_drawdown_pct\"]}%')
          print(f'  Profit Factor: {s[\"profit_factor\"]}')
          print(f'  Final Equity: \${s[\"final_equity\"]:,.2f}')
          print()
          for d, data in s.get('by_direction',{}).items():
              print(f'  {d}: {data[\"count\"]}T, {data[\"win_rate\"]}%WR, {data[\"avg_r\"]}R avg')
          print()
          for er, data in s.get('by_exit_reason',{}).items():
              print(f'  {er}: {data[\"count\"]}T, \${data[\"total_pnl\"]:,.2f}')
          print()
          for wl, data in s.get('by_wave_label',{}).items():
              print(f'  {wl}: {data[\"count\"]}T, {data[\"win_rate\"]}%WR, {data[\"avg_r\"]}R')
          "

      - name: Generate trades CSV
        if: always()
        run: |
          python -c "
          import json, csv
          with open('backtest/results/potter_backtest_results.json') as f:
              r = json.load(f)
          trades = r.get('trades', [])
          if trades:
              with open('backtest/results/potter_trades.csv', 'w', newline='') as f:
                  w = csv.DictWriter(f, fieldnames=trades[0].keys())
                  w.writeheader(); w.writerows(trades)
              print(f'Wrote {len(trades)} trades')
          else: print('No trades')
          "

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: potter-backtest-${{ github.event.inputs.ticker }}-${{ github.run_number }}
          path: |
            backtest/results/potter_backtest_results.json
            backtest/results/potter_trades.csv
            backtest/data/
          retention-days: 30
