# .github/workflows/backtest.yml
# ─────────────────────────────────────────────────────────────────────────────
# Backtest Runner — runs on GitHub's free servers.
#
# HOW TO RUN:
#   1. GitHub repo → Actions tab → "Backtest Runner" → "Run workflow"
#   2. Fill in the inputs (see below)
#   3. Click the green "Run workflow" button
#   4. Wait ~2-4 minutes
#   5. Click the completed run → scroll to "Artifacts" → download results
#
# DATE RANGE MODE:
#   Leave "From date" and "To date" blank → downloads the most recent 22 days
#   Fill in "From date" (and optionally "To date") → downloads that specific window
#
# Examples:
#   Ticker=SPY, Days=22, From=blank, To=blank   → last 22 trading days
#   Ticker=SPY, From=2025-10-01, To=2025-11-30  → specific window
#   Ticker=QQQ, From=2025-06-01, To=2025-07-31  → QQQ summer 2025
# ─────────────────────────────────────────────────────────────────────────────

name: Backtest Runner

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: 'Ticker (e.g. SPY, QQQ, AAPL)'
        required: true
        default: 'SPY'
      days:
        description: 'Trading days to fetch (used only when From/To are blank)'
        required: false
        default: '22'
      from_date:
        description: 'From date YYYY-MM-DD (leave blank for most-recent mode)'
        required: false
        default: ''
      to_date:
        description: 'To date YYYY-MM-DD (leave blank = today, only used with From date)'
        required: false
        default: ''

jobs:
  backtest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests pandas pytz
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Download historical bars
        env:
          MARKETDATA_TOKEN: ${{ secrets.MARKETDATA_TOKEN }}
        run: |
          if [ -n "${{ github.event.inputs.from_date }}" ]; then
            # Date range mode
            TO_ARG=""
            if [ -n "${{ github.event.inputs.to_date }}" ]; then
              TO_ARG="--to ${{ github.event.inputs.to_date }}"
            fi
            python backtest/download_bars.py \
              --ticker ${{ github.event.inputs.ticker }} \
              --from ${{ github.event.inputs.from_date }} \
              $TO_ARG
          else
            # Countback mode (most recent N days)
            python backtest/download_bars.py \
              --ticker ${{ github.event.inputs.ticker }} \
              --days ${{ github.event.inputs.days }}
          fi

      - name: Run backtest replay
        env:
          MARKETDATA_TOKEN: ${{ secrets.MARKETDATA_TOKEN }}
        run: |
          # Find whichever CSV was just downloaded
          DATA_FILE=$(ls backtest/data/*.csv | head -1)
          echo "Using data file: $DATA_FILE"
          python backtest/backtest_replay.py \
            --ticker ${{ github.event.inputs.ticker }} \
            --data "$DATA_FILE"

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backtest-results-${{ github.event.inputs.ticker }}-${{ github.run_number }}
          path: |
            backtest/results/
            backtest/data/
          retention-days: 30
