# .github/workflows/backtest.yml
name: Backtest Runner

on:
  workflow_dispatch:
    inputs:
      ticker:
        description: 'Ticker (e.g. SPY, QQQ, GLD)'
        required: true
        default: 'SPY'
      days:
        description: 'Trading days to fetch (used when From/To are blank)'
        required: false
        default: '22'
      from_date:
        description: 'From date YYYY-MM-DD (leave blank for most-recent mode)'
        required: false
        default: ''
      to_date:
        description: 'To date YYYY-MM-DD (leave blank = today)'
        required: false
        default: ''
      contracts:
        description: 'Option contracts per trade for P&L calculation (default: 1)'
        required: false
        default: '1'
      price_options:
        description: 'Fetch real options pricing after backtest? (yes/no)'
        required: false
        default: 'no'

jobs:
  backtest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests pandas pytz
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Download historical bars
        env:
          MARKETDATA_TOKEN: ${{ secrets.MARKETDATA_TOKEN }}
        run: |
          if [ -n "${{ github.event.inputs.from_date }}" ]; then
            TO_ARG=""
            if [ -n "${{ github.event.inputs.to_date }}" ]; then
              TO_ARG="--to ${{ github.event.inputs.to_date }}"
            fi
            python backtest/download_bars.py \
              --ticker ${{ github.event.inputs.ticker }} \
              --from ${{ github.event.inputs.from_date }} \
              $TO_ARG
          else
            python backtest/download_bars.py \
              --ticker ${{ github.event.inputs.ticker }} \
              --days ${{ github.event.inputs.days }}
          fi

      - name: Run backtest replay
        env:
          MARKETDATA_TOKEN: ${{ secrets.MARKETDATA_TOKEN }}
        run: |
          DATA_FILE=$(ls backtest/data/*.csv | head -1)
          echo "Using data file: $DATA_FILE"
          python backtest/backtest_replay.py \
            --ticker ${{ github.event.inputs.ticker }} \
            --data "$DATA_FILE"

      - name: Fetch options pricing
        if: ${{ github.event.inputs.price_options == 'yes' }}
        env:
          MARKETDATA_TOKEN: ${{ secrets.MARKETDATA_TOKEN }}
        run: |
          python backtest/option_translator.py \
            --ticker ${{ github.event.inputs.ticker }} \
            --contracts ${{ github.event.inputs.contracts }} \
            --trades backtest/results/trades.csv
        # Note: this step makes multiple API calls (2-3 per trade).
        # For 42 SPY trades that is ~120 API calls.
        # Runs after the backtest so it only prices real trades, not gated ones.

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backtest-results-${{ github.event.inputs.ticker }}-${{ github.run_number }}
          path: |
            backtest/results/
            backtest/data/
          retention-days: 30
