<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Legacy Desk &mdash; Sign in</title>
<link rel="stylesheet" href="{{ url_for('dashboard.static', filename='omega.css') }}">
</head>
<body data-account="combined">

<div class="login-shell">
  <div class="login-card">
    {# legacy-v1: shield + L mark, rebranded copy #}
    <div class="login-mark">
      <svg viewBox="0 0 100 110" fill="none">
        <path d="M50 5 L92 17 L92 58 Q92 86 50 104 Q8 86 8 58 L8 17 Z"
              stroke="currentColor" stroke-width="1.6" fill="none"/>
        <path d="M50 12 L86 22 L86 58 Q86 80 50 95 Q14 80 14 58 L14 22 Z"
              stroke="currentColor" stroke-width="0.5" fill="none" opacity="0.45"/>
        <text x="50" y="64" text-anchor="middle"
              font-family="Cormorant Garamond, serif"
              font-size="40" font-weight="500" fill="currentColor">L</text>
        <circle cx="38" cy="80" r="1.6" fill="currentColor"/>
        <circle cx="50" cy="80" r="1.6" fill="currentColor"/>
        <circle cx="62" cy="80" r="1.6" fill="currentColor"/>
      </svg>
      <div class="login-mark-name">THE LEGACY DESK</div>
      <div class="login-mark-sub">Perry &middot; Volkman &middot; Corbin</div>
      <div class="login-tagline">Because family deserves more than guesswork.</div>
    </div>

    <form class="login-form" method="POST" action="{{ url_for('dashboard.login') }}">
      <label class="login-label" for="password">Password</label>
      <input
        class="login-input"
        type="password"
        name="password"
        id="password"
        autofocus
        autocomplete="current-password"
        spellcheck="false">
      <button class="login-button" type="submit">Enter</button>
      {% if error %}
        <div class="login-error">{{ error }}</div>
      {% endif %}
    </form>
  </div>
</div>

</body>
</html>
